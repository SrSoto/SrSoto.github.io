<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lolo Soto | Software Engineering Specialist & Head of Core Application</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Interactive SVG styling */
        .milestone-diagram svg {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .milestone-diagram .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .milestone-diagram .node:hover rect, 
        .milestone-diagram .node:hover circle,
        .milestone-diagram .node:hover ellipse {
            fill: var(--accent-2) !important;
            stroke: #ffffff !important;
            filter: drop-shadow(0 0 8px var(--accent-2));
        }
        .milestone-diagram .node:hover .nodeLabel,
        .milestone-diagram .node:hover i {
            color: #ffffff !important;
            fill: #ffffff !important;
        }
        .milestone-diagram .edgePath path {
            transition: stroke 0.3s ease;
        }
        .milestone-diagram .node:hover + .edgePath path {
            stroke: var(--accent-1) !important;
        }
        /* Fix Mermaid SVG text color for dark theme */
        .milestone-diagram .nodeLabel, .milestone-diagram i {
            color: var(--bg-color) !important;
            font-weight: 600;
        }
    </style>
</head>
